when:
  - event: push
    branch: ainmosni/chore/helm-ci
  - event: push
    branch: v0.0-maintenance
  - event: pull_request
  - event: tag
    ref: refs/tags/v*
  - event: tag
    ref: refs/tags/helm-v*

steps:
  - name: code
    image: golang:1.26.1
    commands:
      - make lint
    when:
      - path:
          exclude: ['*.md', 'docs/**', 'charts/**', 'conf/**']
      - event: tag
        ref: refs/tags/v*

  - name: helm
    image: alpine/helm:4
    commands:
      - helm lint charts/run-dsp
      - helm lint charts/run-dsp-charts
    when:
      - path:
          include: ['charts/**',]
      - event: tag
        ref: refs/tags/helm-v*
